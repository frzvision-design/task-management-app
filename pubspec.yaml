name: student_services_app
description: A Persian student services task management application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Localizations
  flutter_localizations:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.5.6
  
  # Core packages
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  
  # Date and time
  shamsi_date: ^1.0.0
  intl: ^0.20.2
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Fonts
  google_fonts: ^6.1.0
  
  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
